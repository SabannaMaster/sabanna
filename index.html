<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabanna Master | The Kannadiga</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- favicon logo -->
<link rel="icon" type="image/png" sizes="32x32" href="https://ih1.redbubble.net/image.4480288281.3427/st,small,507x507-pad,600x600,f8f8f8.u3.jpg">
<link rel="icon" type="image/png" sizes="16x16" href="https://ih1.redbubble.net/image.4480288281.3427/st,small,507x507-pad,600x600,f8f8f8.u3.jpg">

<style>
:root {
  --primary: #38bdf8;
  --accent: #facc15;
  --bg-dark: #020617;
  --glass: rgba(255, 255, 255, 0.05);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body {
  color: white;
  background: radial-gradient(circle at top right, #1e293b, #020617, #7f1d1d);
  background-attachment: fixed;
  overflow-x: hidden;
}

/* ===== LOADER ===== */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg-dark);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10000;
  transition: opacity 0.6s ease;
}
.loader-text {
  font-size: 40px;
  font-weight: 800;
  background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
  background-size: 200%;
  -webkit-background-clip: text;
  color: transparent;
  animation: shine 2s linear infinite;
}
@keyframes shine { to { background-position: 200%; } }

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0; width: 100%;
  padding: 20px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(2, 6, 23, 0.8);
  backdrop-filter: blur(15px);
  z-index: 2000;
}
nav h2 { font-weight: 800; font-size: 1.5rem; color: var(--primary); }

#menu { display: flex; list-style: none; gap: 30px; }
#menu li { cursor: pointer; font-weight: 600; }

.menu-btn { display: block; font-size: 1.8rem; cursor: pointer; color: var(--primary); display: none; }

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 100px 8% 50px;
  gap: 50px;
}
.hero-text { flex: 1; }
.hero-text h1 {
  font-size: clamp(40px, 8vw, 70px);
  line-height: 1.1;
}
.hero-text span { color: var(--accent); }

/* ===== VIDEO REPLACED WITH SLIDER ===== */
.video-container {
  flex: 1;
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
  border: 1px solid var(--glass);
  aspect-ratio: 16/9;
}

.video-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.video-container img.active {
  opacity: 1;
}

/* ===== BUTTONS ===== */
.btn {
  padding: 15px 35px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(45deg, var(--primary), #0ea5e9);
  color: #000;
  font-weight: 700;
  cursor: pointer;
  transition: 0.4s;
  text-decoration: none;
}

/* ===== CARDS ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 20px;
}
.card {
  background: var(--glass);
  padding: 40px 20px;
  border-radius: 24px;
  text-align: center;
}

/* ===== WHATSAPP ===== */
.whatsapp {
  position: fixed;
  bottom: 30px; right: 30px;
  background: #25D366;
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  color: white;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {
  .hero {
    flex-direction: column;
    text-align: center;
    padding: 100px 5% 40px;
    gap: 30px;
  }

  /* 🔥 FIX BIG TEXT ON MOBILE */
  .hero-text h1 {
    font-size: 32px;
    line-height: 1.2;
  }

  .hero-text p {
    font-size: 14px;
    margin-top: 10px;
    opacity: 0.9;
  }

  /* 🔥 BUTTON FIX */
  .btn {
    padding: 12px 25px;
    font-size: 14px;
  }

  /* 🔥 CARDS FIX */
  .cards {
    grid-template-columns: 1fr;
    padding: 10px;
  }

  .card {
    padding: 25px 15px;
    font-size: 14px;
  }

  /* 🔥 NAV MENU */
  .menu-btn {
    display: block;
  }

  #menu {
    position: fixed;
    top: 70px;
    left: -100%;
    width: 100%;
    height: calc(100vh - 70px);
    background: var(--bg-dark);
    flex-direction: column;
    align-items: center;
    padding-top: 50px;
    transition: 0.5s;
    gap: 25px;
  }

  #menu li {
    font-size: 18px;
  }

  #menu.active {
    left: 0;
  }

  /* 🔥 SLIDER FIX */
  .video-container {
    width: 100%;
  }

  /* OPTIONAL: nav title smaller */
  nav h2 {
    font-size: 1.2rem;
  }
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-text">Sabanna Master</div>
</div>

<!-- NAV -->
<nav>
  <h2>Sabanna Master</h2>
  <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  <ul id="menu">
    <li onclick="go('home')">Home</li>
    <li onclick="go('teach')">Education</li>
    <li onclick="go('importance')">Why 10th?</li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-text">
    <h1>Master Your <span>Future</span> in Kannada</h1>
    <p>Simplifying education for Karnataka students.</p>
    <button class="btn" onclick="window.open('https://youtube.com/@sabanna_master','_blank')">
      Explore Channel
    </button>
  </div>

  <!-- ✅ ONLY CHANGE: VIDEO → IMAGE SLIDER -->
  <div class="video-container reveal">
    <img src="https://picsum.photos/id/1015/800/450" class="active">
    <img src="https://picsum.photos/id/1016/800/450">
    <img src="https://picsum.photos/id/1025/800/450">
    <img src="https://picsum.photos/id/1035/800/450">
  </div>
</section>

<!-- REST OF YOUR CONTENT (UNCHANGED) -->
<section id="teach" style="padding:100px 5%;">
  <h2 style="text-align:center;">Specialized Coaching</h2>
  <div class="cards">
    <div class="card">10th Backlogs</div>
    <div class="card">PUC Concepts</div>
    <div class="card">Kannada Grammar</div>
  </div>
</section>

<section id="importance" style="padding:100px 5%; text-align:center;">
  <h2>Why 10th is Important</h2>
  <div class="cards">
    <div class="card">Master Key Stage</div>
    <div class="card">Career Roadmap</div>
    <div class="card">Mental Strength</div>
  </div>
</section>

<a href="https://wa.me/919663321579" class="whatsapp">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
// loader
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 1200);
});

// menu
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function go(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  document.getElementById("menu").classList.remove("active");
}

// ✅ IMAGE SLIDER (2 sec)
const images = document.querySelectorAll(".video-container img");
let currentIndex = 0;

// ensure first image is visible
images.forEach((img, index) => {
  img.classList.remove("active");
});
images[0].classList.add("active");

setInterval(() => {
  images[currentIndex].classList.remove("active");

  currentIndex = (currentIndex + 1) % images.length;

  images[currentIndex].classList.add("active");
}, 2000); // ✅ 2 seconds delay exactly
</script>

</body>
</html>
